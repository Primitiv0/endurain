name: Create Docker image on new release or using manual trigger

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:

  build:

    runs-on: codeberg-medium

    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Codeberg Container Registry
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.TOKEN_FOR_ACTIONS }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: codeberg.org/${{ forgejo.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=raw,value=latest,enable=${{ forgejo.event_name == 'release' }}
            type=raw,value=dev-{{sha}},enable=${{ forgejo.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}