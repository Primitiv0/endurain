name: Deploy documentation

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Build docs but do not deploy
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'backend/app/**/*.py'
      - '.forgejo/workflows/docs.yml'

permissions:
  contents: write

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:

  deploy:

    runs-on: codeberg-small

    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: https://data.forgejo.org/astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: backend

      - name: Sync documentation dependencies
        working-directory: backend
        run: uv sync --frozen --only-group docs
      - name: Build documentation
        run: uv run --no-sync --project backend mkdocs build --site-dir site

      - name: Set dry-run mode
        if: ${{ inputs.dry-run == true }}
        run: echo "DOCS_DRY_RUN=true" >> "$FORGEJO_ENV"

      - name: Deploy documentation to Codeberg Pages
        if: env.DOCS_DRY_RUN != 'true'
        uses: https://data.forgejo.org/actions/git-pages@5978530ffb9bbe196ad9fdc0c48fdaf1483de4cf # v2.1.0
        with:
          site: https://docs.endurain.com/
          server: codeberg.page
          token: ${{ forge.token }}
          source: site/