name: Create Docker image on new release or using manual trigger

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:

  build-arch-images:

    name: Build ${{ matrix.arch }} image
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: codeberg-medium
          - arch: arm64
            platform: linux/arm64
            runner: local-runner
    env:
      IMAGE_NAME: codeberg.org/${{ forgejo.repository }}

    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Buildah
        if: ${{ matrix.arch == 'amd64' }}
        run: apt-get update && apt-get install --yes buildah ca-certificates

      - name: Login to Codeberg registry with Docker
        if: ${{ matrix.arch == 'arm64' }}
        env:
          REGISTRY_PASSWORD: ${{ secrets.TOKEN_FOR_ACTIONS }}
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login \
            --username "${{ forgejo.repository_owner }}" \
            --password-stdin \
            codeberg.org

      - name: Publish release architecture image
        if: ${{ forgejo.event_name == 'release' && matrix.arch == 'amd64' }}
        uses: https://codeberg.org/actions/buildah-simple@main
        with:
          context: .
          push: true
          registry: codeberg.org
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.TOKEN_FOR_ACTIONS }}
          tag: ${{ env.IMAGE_NAME }}:${{ forgejo.ref_name }}-${{ matrix.arch }}
          additional_flags: "--file docker/Dockerfile --platform ${{ matrix.platform }}"

      - name: Publish development architecture image
        if: ${{ forgejo.event_name == 'workflow_dispatch' && matrix.arch == 'amd64' }}
        uses: https://codeberg.org/actions/buildah-simple@main
        with:
          context: .
          push: true
          registry: codeberg.org
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.TOKEN_FOR_ACTIONS }}
          tag: ${{ env.IMAGE_NAME }}:dev-${{ forgejo.sha }}-${{ matrix.arch }}
          additional_flags: "--file docker/Dockerfile --platform ${{ matrix.platform }}"

      - name: Publish release ARM64 image
        if: ${{ forgejo.event_name == 'release' && matrix.arch == 'arm64' }}
        run: |
          set -eu
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --network host \
            --file docker/Dockerfile \
            --tag "${IMAGE_NAME}:${{ forgejo.ref_name }}-${{ matrix.arch }}" \
            --push \
            .

      - name: Publish development ARM64 image
        if: ${{ forgejo.event_name == 'workflow_dispatch' && matrix.arch == 'arm64' }}
        run: |
          set -eu
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --network host \
            --file docker/Dockerfile \
            --tag "${IMAGE_NAME}:dev-${{ forgejo.sha }}-${{ matrix.arch }}" \
            --push \
            .

  publish-manifests:

    name: Publish multi-arch manifests
    runs-on: local-runner
    needs: build-arch-images
    env:
      IMAGE_NAME: codeberg.org/${{ forgejo.repository }}

    steps:
      - name: Login to Codeberg registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.TOKEN_FOR_ACTIONS }}
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login \
            --username "${{ forgejo.repository_owner }}" \
            --password-stdin \
            codeberg.org

      - name: Publish release tag manifest
        if: ${{ forgejo.event_name == 'release' }}
        env:
          RELEASE_TAG: ${{ forgejo.ref_name }}
        run: |
          set -eu
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${RELEASE_TAG}" \
            "${IMAGE_NAME}:${RELEASE_TAG}-amd64" \
            "${IMAGE_NAME}:${RELEASE_TAG}-arm64"

      - name: Publish latest manifest
        if: ${{ forgejo.event_name == 'release' }}
        env:
          RELEASE_TAG: ${{ forgejo.ref_name }}
        run: |
          set -eu
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${RELEASE_TAG}-amd64" \
            "${IMAGE_NAME}:${RELEASE_TAG}-arm64"

      - name: Publish development manifest
        if: ${{ forgejo.event_name == 'workflow_dispatch' }}
        env:
          DEVELOPMENT_TAG: dev-${{ forgejo.sha }}
        run: |
          set -eu
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${DEVELOPMENT_TAG}" \
            "${IMAGE_NAME}:${DEVELOPMENT_TAG}-amd64" \
            "${IMAGE_NAME}:${DEVELOPMENT_TAG}-arm64"
