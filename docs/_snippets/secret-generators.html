<section class="secret-tools" data-secret-tools>
  <p class="secret-tools__intro">
    Generate secrets in your browser (equivalent to <code>openssl rand -hex 32</code> and
    <code>openssl rand -base64 32</code>) and copy them to your clipboard.
  </p>

  <article class="secret-tools__item" data-secret-tool data-format="hex" data-bytes="32">
    <h4><code>openssl rand -hex 32</code></h4>
    <div class="secret-tools__controls">
      <input
        class="secret-tools__output"
        type="text"
        readonly
        spellcheck="false"
        aria-label="Generated hexadecimal secret"
        placeholder="Click Generate"
      >
      <button type="button" class="md-button md-button--primary" data-secret-generate>Generate</button>
      <button type="button" class="md-button" data-secret-copy>Copy</button>
    </div>
    <p class="secret-tools__hint" data-secret-status aria-live="polite"></p>
  </article>

  <article class="secret-tools__item" data-secret-tool data-format="base64" data-bytes="32">
    <h4><code>openssl rand -base64 32</code></h4>
    <div class="secret-tools__controls">
      <input
        class="secret-tools__output"
        type="text"
        readonly
        spellcheck="false"
        aria-label="Generated base64 secret"
        placeholder="Click Generate"
      >
      <button type="button" class="md-button md-button--primary" data-secret-generate>Generate</button>
      <button type="button" class="md-button" data-secret-copy>Copy</button>
    </div>
    <p class="secret-tools__hint" data-secret-status aria-live="polite"></p>
  </article>
</section>
