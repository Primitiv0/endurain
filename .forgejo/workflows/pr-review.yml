# Forgejo Actions workflow for AI-powered PR review.
# Deploy this file to the Endurain repository at:
#   .forgejo/workflows/pr-review.yml
#
# Required Codeberg repository configuration:
#   Variables  → REVIEW_BOT_URL  (for local setup: http://review-bot:5000)
#   Secrets    → WEBHOOK_SECRET  (must match WEBHOOK_SECRET env var on the bot container)

on:
  pull_request:
    types:
      - labeled

concurrency:
  # Serialize per-PR so rapid label add/remove/add cannot trigger overlapping
  # reviews; cancel any in-flight run for the same PR when a new one starts.
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: local-runner
    # Forgejo's `pull_request: [labeled]` trigger fires for every label, not
    # just `ai-review`. Filter here so unrelated labels (and drafts) don't
    # spin up a runner container that would only end up POSTing a payload
    # the bot then skips. Forgejo Actions has no `permissions:` block (no
    # auto-issued repo token like GitHub Actions), so this `if:` is the
    # only knob we need at the workflow level.
    if: >-
      ${{ forgejo.event.label.name == 'ai-review'
          && !forgejo.event.pull_request.draft
          && forgejo.event.pull_request.state == 'open' }}
    steps:
      - name: Trigger AI review bot
        env:
          REVIEW_BOT_URL: ${{ vars.REVIEW_BOT_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          echo "Review bot URL: ${REVIEW_BOT_URL}"
          echo "Event path:     ${FORGEJO_EVENT_PATH}"
          echo "Event size:     $(wc -c < "$FORGEJO_EVENT_PATH") bytes"
          echo "Webhook secret: $([ -n "$WEBHOOK_SECRET" ] && echo set || echo unset)"

          AUTH_HEADER=()
          if [ -n "$WEBHOOK_SECRET" ]; then
            # Read HMAC key from env var name to avoid putting the secret in process args.
            SIG=$(openssl dgst -sha256 -mac HMAC -macopt keyenv:WEBHOOK_SECRET "$FORGEJO_EVENT_PATH" | awk '{print $2}')
            AUTH_HEADER=(-H "X-Forgejo-Signature: ${SIG}")
            echo "Computed signature: ${SIG:0:12}…"
          fi

          echo "POSTing event to review bot…"
          HTTP_CODE=$(curl -sS --max-time 360 -o /tmp/review-bot-response.txt \
            -w "%{http_code}" \
            -X POST "${REVIEW_BOT_URL}/webhook" \
            -H "Content-Type: application/json" \
            -H "X-Forgejo-Event: pull_request" \
            "${AUTH_HEADER[@]}" \
            -d @"$FORGEJO_EVENT_PATH")

          echo "Review bot HTTP status: ${HTTP_CODE}"
          echo "Review bot response body:"
          cat /tmp/review-bot-response.txt || true
          echo

          if [ "${HTTP_CODE}" -ge 400 ]; then
            echo "Review bot returned an error status." >&2
            exit 1
          fi
