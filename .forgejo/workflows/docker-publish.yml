name: Create Docker image on new release or using manual trigger

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: false

jobs:

  build:

    runs-on: codeberg-medium
    env:
      IMAGE_NAME: codeberg.org/${{ forgejo.repository }}

    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Buildah
        run: apt-get update && apt-get install --yes buildah ca-certificates

      - name: Publish release tag image
        if: ${{ forgejo.event_name == 'release' }}
        uses: https://codeberg.org/actions/buildah-simple@main
        with:
          context: .
          push: true
          registry: codeberg.org
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.TOKEN_FOR_ACTIONS }}
          tag: ${{ env.IMAGE_NAME }}:${{ forgejo.ref_name }}
          additional_flags: "--file docker/Dockerfile"

      - name: Publish latest image
        if: ${{ forgejo.event_name == 'release' }}
        uses: https://codeberg.org/actions/buildah-simple@main
        with:
          context: .
          push: true
          registry: codeberg.org
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.TOKEN_FOR_ACTIONS }}
          tag: ${{ env.IMAGE_NAME }}:latest
          additional_flags: "--file docker/Dockerfile"

      - name: Publish development image
        if: ${{ forgejo.event_name == 'workflow_dispatch' }}
        uses: https://codeberg.org/actions/buildah-simple@main
        with:
          context: .
          push: true
          registry: codeberg.org
          username: ${{ forgejo.repository_owner }}
          password: ${{ secrets.TOKEN_FOR_ACTIONS }}
          tag: ${{ env.IMAGE_NAME }}:dev-${{ forgejo.sha }}
          additional_flags: "--file docker/Dockerfile"