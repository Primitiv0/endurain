name: Deploy documentation

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'backend/app/**/*.py'

permissions:
  contents: write

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:

  deploy:

    runs-on: codeberg-medium

    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: https://data.forgejo.org/actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install documentation dependencies
        run: pip install mkdocs-material mkdocstrings[python]

      - name: Build documentation
        run: mkdocs build --site-dir site

      - name: Deploy documentation to Codeberg Pages
        uses: https://codeberg.org/git-pages/action@v2
        with:
          site: https://${{ forge.repository_owner }}.codeberg.page/${{ forge.event.repository.name }}/
          token: ${{ forge.token }}
          source: site/