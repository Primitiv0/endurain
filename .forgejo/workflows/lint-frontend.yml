name: Lint Frontend

on:
  push:
    branches:
      - master
    paths:
      - frontend/**
      - .forgejo/workflows/lint-frontend.yml
  pull_request:
    paths:
      - frontend/**
      - .forgejo/workflows/lint-frontend.yml

permissions:
  contents: read

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:

  frontend:
    name: Frontend (eslint + prettier + type-check)
    runs-on: codeberg-small
    steps:
      - name: Checkout code
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install dependencies
        working-directory: frontend/app
        run: npm ci

      - name: Check formatting (Prettier)
        working-directory: frontend/app
        run: npm run format:check

      - name: Check linting (ESLint)
        working-directory: frontend/app
        run: npm run lint:check

      - name: Type check (vue-tsc)
        working-directory: frontend/app
        run: npm run type-check
